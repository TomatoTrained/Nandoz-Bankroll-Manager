<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Nandoz Odds">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="1" stop-color="#e3f2ff"/>
    </linearGradient>
    <radialGradient id="cityGlow" cx="18%" cy="20%" r="70%">
      <stop offset="0" stop-color="#6CABDD" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#6CABDD" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#6CABDD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="80%" cy="78%" r="75%">
      <stop offset="0" stop-color="#24c26a" stop-opacity="0.30"/>
      <stop offset="0.6" stop-color="#24c26a" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#24c26a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2b83c6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6CABDD" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#071a28" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#cityGlow)"/>
  <rect width="1600" height="900" fill="url(#greenGlow)"/>

  <!-- subtle diagonal pattern -->
  <g opacity="0.10">
    <path d="M-200 980L980-200" stroke="#2b83c6" stroke-width="3"/>
    <path d="M-80 980L1100-200" stroke="#2b83c6" stroke-width="3"/>
    <path d="M40 980L1220-200" stroke="#2b83c6" stroke-width="3"/>
    <path d="M160 980L1340-200" stroke="#2b83c6" stroke-width="3"/>
    <path d="M280 980L1460-200" stroke="#2b83c6" stroke-width="3"/>
    <path d="M400 980L1580-200" stroke="#2b83c6" stroke-width="3"/>
  </g>

  <!-- centered mark -->
  <g filter="url(#shadow)">
    <rect x="430" y="280" width="740" height="340" rx="48" fill="rgba(255,255,255,.88)" stroke="url(#stroke)" stroke-width="3"/>
    <g transform="translate(520 350)">
      <circle cx="70" cy="70" r="70" fill="#6CABDD" opacity="0.22"/>
      <path d="M95 18L34 106h52l-20 74 62-94H76l19-68z" fill="#2b83c6"/>
      <text x="170" y="70" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="900" letter-spacing="6" fill="#071a28">NANDOZ</text>
      <text x="170" y="135" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="900" letter-spacing="6" fill="#071a28">ODDS</text>
      <text x="170" y="176" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="3" fill="rgba(7,26,40,.62)">LOGO + BACKGROUND ASSET</text>
      <rect x="170" y="198" width="360" height="10" rx="5" fill="#24c26a" opacity="0.9"/>
    </g>
  </g>
</svg>
